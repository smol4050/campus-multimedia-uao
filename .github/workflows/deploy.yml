name: Deploy Escuchando el Campus UAO

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          # Si moviste los archivos a la raíz, usa "."
          # Si siguen en wwwroot, cambia esto por la ruta exacta
          path: "C:\Users\Stiven\source\repos\campus-multimedia-uao\CampusUAO\CampusUAO\wwwroot"

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4