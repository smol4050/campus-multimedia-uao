<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora el Campus UAO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <section id="home-screen" class="home-screen active">
        <div class="home-bg-image"></div>
        <div class="home-content glass-panel">
            <img src="assets/images/logo-uao.png" alt="Logo UAO" class="home-logo">
            <h1 class="home-title">Escuchando el Campus UAO</h1>
            <p class="home-subtitle">Descubre la identidad sensorial, visual y sonora de nuestra universidad a través de un recorrido interactivo.</p>
            <button id="btn-explore" class="btn-primary">
                <span>Explorar ahora</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
    </section>

    <div id="app" class="app-container hidden">
        <header class="glass-header">
            <div class="header-brand">
                <img src="assets/images/logo-uao.png" alt="UAO" class="header-logo">
                <div class="header-content">
                    <h1>Campus UAO</h1>
                    <p>Memoria sensorial interactiva</p>
                </div>
            </div>
            <div id="theme-toggle" class="toggle9">
                <div class="sun"></div>
                <div class="moon"></div>
                <div class="corona"></div>
                <div class="atmosphere"></div>
                <div class="stars"></div>
            </div>
        </header>

        <nav id="filters-container" class="filters-bar"></nav>

        <main class="app-layout">
            <aside class="sidebar">
                <div id="zones-list" class="zones-list"></div>
            </aside>

            <section class="main-content">
                <div id="empty-state" class="empty-state active">
                    <h2>Descubre el Campus</h2>
                    <p>Selecciona una zona o explora aquí abajo:</p>
                    <div id="welcome-carousel" class="welcome-carousel"></div>
                </div>

                <article id="zone-detail" class="zone-card hidden glass-panel">
                    <div class="zone-header">
                        <span id="zone-category" class="badge"></span>
                    </div>
                    <h2 id="zone-title"></h2>

                    <div class="media-gallery" id="media-gallery"></div>

                    <p id="zone-description" class="description"></p>

                    <div class="actions-wrapper">
                        <a id="zone-link" href="#" target="_blank" class="btn-secondary">
                            MÁS INFORMACIÓN DEL ESPACIO
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                        </a>
                    </div>

                    <div class="audio-player mt-4">
                        <div class="audio-header">
                            <p class="audio-label">🎧 Ambiente:</p>
                            <div id="audio-visualizer" class="visualizer">
                                <span></span><span></span><span></span><span></span><span></span>
                            </div>
                        </div>
                        <audio id="zone-audio" controls></audio>
                    </div>
                </article>
            </section>

            <aside class="minimap-column">
                <div id="minimap-wrapper" class="minimap-wrapper glass-panel">
                    <div id="map-container" style="width: 100%; height: 100%;"></div>
                    <button id="btn-close-map" class="btn-close-map hidden">&times;</button>
                </div>
                <button id="btn-fullscreen-map" class="btn-secondary map-btn">Abrir Mapa</button>
            </aside>
        </main>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
